<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegance | Curated Fashion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <a href="index.html" class="logo">Elegance</a>
        <nav class="filters">
            <button class="filter-btn active" data-filter="All">All Collection</button>
            <button class="filter-btn" data-filter="New">New Arrivals</button>
            <button class="filter-btn" data-filter="Preloved">Preloved</button>
            <button class="filter-btn" data-filter="Bags">Bags</button>
        </nav>
        <div class="header-actions"></div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Discover Your Signature Style</h1>
            <p>Curated new arrivals and sustainably sourced preloved fashion.</p>
            <button class="shop-now-btn" onclick="document.getElementById('product-grid').scrollIntoView({behavior: 'smooth'})">Shop the Collection</button>
        </div>
    </section>

    <main class="container">
        <div id="product-grid" class="product-grid"></div>
    </main>

    <footer>
        <div class="footer-content">
            <h2>Elegance</h2>
            <p>Premium Women's Fashion & Preloved Boutique.</p>
            <p>&copy; 2026 Elegance Store. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
