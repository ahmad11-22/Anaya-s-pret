<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | AnayasPret</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .admin-layout { max-width: 800px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-layout h2, .admin-layout h3 { margin-bottom: 20px; font-family: 'Playfair Display', serif; }
        .login-box { max-width: 400px; margin: 100px auto; padding: 40px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body style="background-color: #f9f9f9;">

    <header>
        <a href="index.html" class="logo">AnayasPret <span style="font-size: 0.5em; color: var(--accent); vertical-align: middle;">ADMIN</span></a>
        <div class="header-actions">
            <a href="index.html" class="icon-btn" style="text-decoration:none;"><i class="fas fa-store"></i> Store</a>
            <button id="logout-btn" class="icon-btn" style="display:none;" onclick="logoutApp()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </header>

    <div id="admin-login-screen" class="login-box">
        <h2 style="text-align: center; margin-bottom: 20px;">System Gateway</h2>
        <form id="login-form">
            <input type="email" id="login-email" placeholder="Admin Email" required style="width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ccc;">
            <input type="password" id="login-password" placeholder="Password" required style="width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ccc;">
            <button type="submit" class="save-btn" id="login-submit-btn" style="width: 100%;">Secure Login</button>
        </form>
        <p id="login-error" style="color: var(--danger); text-align: center; margin-top: 15px; display: none; font-weight: 600;"></p>
    </div>

    <main id="admin-dashboard" class="container" style="display: none;">
        <div class="admin-layout">
            <h2>Add New Product</h2>
            <form id="add-product-form">
                <input type="text" id="p-name" placeholder="Product Name" required>
                <input type="number" id="p-price" placeholder="Price (Rs.)" required>
                <select id="p-category">
                    <option value="New">New Arrivals</option>
                    <option value="Preloved">Preloved</option>
                    <option value="Bags">Bags</option>
                </select>
                
                <label for="p-image-file" class="file-label">Upload Images (Hold CTRL to select multiple):</label>
                <input type="file" id="p-image-file" accept="image/*" multiple required>
                <p id="file-upload-feedback" style="font-size: 13px; font-weight: 600; margin-bottom: 10px;"></p>

                <textarea id="p-desc" placeholder="Detailed Product Description..." required style="height: 120px;"></textarea>
                <button type="submit" class="save-btn">Add Product to Store</button>
            </form>
            
            <hr style="margin: 40px 0; border-top: 1px solid #eee;">
            
            <h3>Current Inventory</h3>
            <div id="admin-inventory"></div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
